version: "3.8"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: taskflow
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # volume → 컨테이너 삭제해도 데이터 유지

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # 백엔드는 처음에는 로컬에서 직접 실행 (디버깅 쉬움)
  # Phase 6에서 Dockerfile 추가

volumes:
  mysql_data:
